name: iOS CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test step?'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
      - name: Run SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml --quiet 2>&1 | tee swiftlint-report.txt
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swiftlint-report
          path: swiftlint-report.txt
          retention-days: 7

  test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 45
    needs: lint
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Restore SPM cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', '*.xcodeproj/project.pbxproj') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -workspace BuildTrack.xcworkspace -scheme BuildTrack
      - name: Build for testing
        run: xcodebuild build-for-testing -workspace BuildTrack.xcworkspace -scheme BuildTrack -destination "platform=iOS Simulator,name=iPhone 15,OS=17.5" -derivedDataPath fastlane/DerivedData -enableCodeCoverage YES COMPILER_INDEX_STORE_ENABLE=NO
      - name: Run unit tests
        run: xcodebuild test-without-building -workspace BuildTrack.xcworkspace -scheme BuildTrack -destination "platform=iOS Simulator,name=iPhone 15,OS=17.5" -derivedDataPath fastlane/DerivedData -only-testing:BuildTrackTests -resultBundlePath fastlane/test_output/BuildTrack.xcresult
      - name: Run UI tests
        run: xcodebuild test-without-building -workspace BuildTrack.xcworkspace -scheme BuildTrack -destination "platform=iOS Simulator,name=iPhone 15,OS=17.5" -derivedDataPath fastlane/DerivedData -only-testing:BuildTrackUITests -resultBundlePath fastlane/test_output/BuildTrackUI.xcresult
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: fastlane/test_output/
          retention-days: 14

  build:
    name: Archive Build
    runs-on: macos-14
    timeout-minutes: 30
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Restore SPM cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', '*.xcodeproj/project.pbxproj') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Archive
        run: xcodebuild archive -workspace BuildTrack.xcworkspace -scheme BuildTrack -configuration Release -destination "generic/platform=iOS" -archivePath fastlane/build/BuildTrack.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO COMPILER_INDEX_STORE_ENABLE=NO
      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: build-archive
          path: fastlane/build/BuildTrack.xcarchive
          retention-days: 7

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - run: |
          echo "## iOS CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job    | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint   | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test   | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build  | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
