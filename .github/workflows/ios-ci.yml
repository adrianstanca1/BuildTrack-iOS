name: iOS CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test step?'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint &> /dev/null; then
            brew install swiftlint
          fi
      - name: Run SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml --quiet 2>&1 | tee swiftlint-report.txt
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swiftlint-report
          path: swiftlint-report.txt
          retention-days: 7

  test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 45
    needs: lint
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Restore SPM cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', '*.xcodeproj/project.pbxproj') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Build with Swift Package Manager
        run: swift build

  build:
    name: Archive Build
    runs-on: macos-14
    timeout-minutes: 30
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Restore SPM cache
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-
      - name: Build with Swift Package Manager
        run: swift build
      - name: Upload build results
        if: always()
        run: echo "Build complete"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - run: |
          echo "## iOS CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job    | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint   | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test   | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build  | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
