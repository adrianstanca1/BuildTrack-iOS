name: Deploy to TestFlight

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: false
        default: ''

concurrency:
  group: deploy-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-14
    timeout-minutes: 45
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Restore SPM cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -workspace BuildTrack.xcworkspace -scheme BuildTrack

      - name: Setup signing
        run: |
          # Create keychain
          KEYCHAIN_PASSWORD="buildtrack-ci"
          KEYCHAIN_PATH="$RUNNER_TEMP/buildtrack.keychain"
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/.*"\(.*\)".*/\1/')
          
          # Decode cert and key separately, then combine into P12 on the runner
          echo "${{ secrets.IOS_DISTRIBUTION_CERT }}" | base64 -d > /tmp/distribution.cer
          echo "${{ secrets.IOS_DISTRIBUTION_KEY }}" | base64 -d > /tmp/distribution.key
          openssl pkcs12 -export -in /tmp/distribution.cer -inkey /tmp/distribution.key \
            -out /tmp/distribution.p12 -name "BuildTrack Distribution" \
            -passout pass:buildtrack123
          
          # Import P12 into keychain
          security import /tmp/distribution.p12 -P "buildtrack123" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Decode and install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/buildtrack_app_store.mobileprovision
          
          echo "=== Keychain contents ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          
          echo "=== Installed profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Bump build number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" BuildTrack/Info.plist

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -workspace BuildTrack.xcworkspace \
            -scheme BuildTrack \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/BuildTrack.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="BuildTrack App Store v2" \
            DEVELOPMENT_TEAM="4G3G5MX9BH" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>4G3G5MX9BH</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>ro.stancainvest.buildtrack</key>
              <string>BuildTrack App Store v2</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "build/BuildTrack.xcarchive" \
            -exportPath "build/BuildTrack.ipa" \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(find build/BuildTrack.ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BuildTrack-IPA
          path: build/BuildTrack.ipa/*.ipa
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/buildtrack.keychain" || true
          rm -rf ~/.appstoreconnect/private_keys || true
