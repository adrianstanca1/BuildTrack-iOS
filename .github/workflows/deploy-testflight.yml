name: Deploy to TestFlight

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-testflight.yml'
      - 'BuildTrack/**'
      - 'BuildTrack.xcodeproj/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: false
        default: ''

concurrency:
  group: deploy-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-15
    timeout-minutes: 45
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26.3
        run: |
          echo "Available Xcode versions:"
          ls /Applications/ | grep Xcode | sort
          echo ""
          echo "Selecting Xcode 26.3 explicitly..."
          sudo xcode-select -s "/Applications/Xcode_26.3.app/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphoneos --show-sdk-build-version

      - name: Restore SPM cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve dependencies
        run: xcodebuild -resolvePackageDependencies -workspace BuildTrack.xcworkspace -scheme BuildTrack

      - name: Setup signing
        run: scripts/setup-signing.sh
        env:
          IOS_DISTRIBUTION_CERT: ${{ secrets.IOS_DISTRIBUTION_CERT }}
          IOS_DISTRIBUTION_KEY: ${{ secrets.IOS_DISTRIBUTION_KEY }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}

      - name: Bump build number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" BuildTrack/Info.plist

      - name: Build unsigned archive
        run: |
          xcodebuild archive \
            -workspace BuildTrack.xcworkspace \
            -scheme BuildTrack \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/BuildTrack.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export signed IPA
        run: |
          mkdir -p build
          cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>4G3G5MX9BH</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>ro.stancainvest.buildtrack</key>
              <string>BuildTrack App Store v3</string>
            </dict>
            <key>signingCertificate</key>
            <string>iPhone Distribution: Adrian Stanca (4G3G5MX9BH)</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "build/BuildTrack.xcarchive" \
            -exportPath "build/BuildTrack.ipa" \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Inspect IPA
        run: |
          IPA_PATH=$(find build/BuildTrack.ipa -name "*.ipa" -type f | head -1)
          echo "=== IPA Info ==="
          ls -la "$IPA_PATH"
          echo ""
          echo "=== Unzip and inspect ==="
          mkdir -p /tmp/ipa_inspect
          unzip -q "$IPA_PATH" -d /tmp/ipa_inspect
          echo "Contents:"
          find /tmp/ipa_inspect -maxdepth 3 -type f | head -30
          echo ""
          echo "=== Info.plist ==="
          cat /tmp/ipa_inspect/Payload/BuildTrack.app/Info.plist | head -50
          echo ""
          echo "=== Bundle ID ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" /tmp/ipa_inspect/Payload/BuildTrack.app/Info.plist
          echo ""
          echo "=== CFBundleIconName ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" /tmp/ipa_inspect/Payload/BuildTrack.app/Info.plist 2>/dev/null || echo "CFBundleIconName NOT FOUND"

      - name: Setup App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$ASC_KEY_ID.p8

      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(find build/BuildTrack.ipa -name "*.ipa" -type f | head -1)
          echo "Uploading: $IPA_PATH"
          ls -la "$IPA_PATH" 2>/dev/null || true
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BuildTrack-IPA
          path: build/BuildTrack.ipa/*.ipa
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/buildtrack.keychain" || true
          rm -rf ~/.appstoreconnect/private_keys || true
          rm -rf /tmp/ipa_inspect || true
