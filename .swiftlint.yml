disabled_rules:
  - attributes
  - force_unwrapping
  - trailing_comma
  - statement_position
  - modifier_order
  - operator_usage_whitespace
  - pattern_matching_keywords
  - trailing_whitespace
  - vertical_whitespace_opening_braces
  - vertical_whitespace_closing_braces
  - switch_case_alignment
  - implicit_return
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - redundant_discardable_let
  - implicit_optional_initialization
  - function_parameter_count
  - force_try

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - identical_operands
  # - implicit_return
  - joined_default_parameter
  - legacy_random
  - nimble_operator
  - nslocalizedstring_key
  - object_literal
  - overridden_super_call
  - override_in_extension
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - single_test_class
  - sorted_first_last
  - superfluous_disable_command
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_enumerated
  - unused_import
  - yoda_condition

included:
  - .

excluded:
  - Pods
  - DerivedData
  - fastlane
  - vendor
  - Build
  - .build
  - .swiftpm
  - Carthage
  - Frameworks
  - Scripts
  - Resources
  - Assets.xcassets

line_length:
    warning: 300
    error: 400
    ignores_urls: true
    ignores_function_declarations: true
    ignores_comments: true
    ignores_interpolated_strings: true

file_length:
    warning: 1500
    error: 2000

type_body_length:
    warning: 500
    error: 800

function_body_length:
    warning: 150
    error: 200

identifier_name:
    excluded:
        - id
        - x
        - y
        - z
        - i
        - j
        - k
        - p
        - s
        - r
        - n
        - a
        - b
        - c
        - d
        - e
        - f
        - g
        - h
        - l
        - m
        - o
        - q
        - t
        - u
        - v
        - w
    min_length:
        warning: 1
        error: 1
    max_length:
        warning: 60
        error: 80

cyclomatic_complexity:
    - 12

attributes:
    always_on_line_above:
        - "@Model"
        - "@Relationship"
        - "@Attribute"
        - "@Query"
        - "@Published"
        - "@StateObject"
        - "@ObservedObject"
        - "@Environment"
        - "@EnvironmentObject"
        - "@Binding"
        - "@AppStorage"
        - "@SceneStorage"
        - "@UIApplicationDelegateAdaptor"
        - "@main"
    always_on_same_line:
        - "@IBOutlet"
        - "@IBAction"
        - "@IBInspectable"
        - "@IBDesignable"
        - "@NSManaged"

reporter: xcode
