disabled_rules:
  - trailing_whitespace
  - vertical_whitespace_opening_braces
  - vertical_whitespace_closing_braces

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - legacy_random
  - let_var_whitespace
  - modifier_order
  - multiline_function_chains
  - multiline_parameters
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prohibited_super_call
  - quick_discouraged_call
  - reduce_into
  - redundant_nil_coalescing
  - single_test_class
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - unused_import
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - yoda_condition

included:
  - App
  - Domain
  - DesignSystem
  - Features
  - Infrastructure
  - Tests

excluded:
  - BuildTrack.xcodeproj
  - BuildTrack.xcworkspace
  - .build
  - fastlane
  - scripts
  - Assets.xcassets

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true
  ignores_interpolated_strings: true

file_length:
  warning: 500
  error: 1200

# Allow Models.swift to be longer since it contains all domain models
custom_rules:
  models_file_length:
    excluded:
      - Domain/Models/Models.swift

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 100

function_parameter_count:
  warning: 6
  error: 10

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 2
  statement_level:
    warning: 5

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - k
    - n
    - x1
    - x2
    - y1
    - y2

attributes:
  always_on_line_above:
    - "@Model"
    - "@Relationship"
    - "@Attribute"
    - "@Query"
    - "@Published"
    - "@State"
    - "@StateObject"
    - "@ObservedObject"
    - "@Environment"
    - "@EnvironmentObject"
    - "@Binding"
    - "@AppStorage"
    - "@SceneStorage"
    - "@UIApplicationDelegateAdaptor"
    - "@main"
  always_on_same_line:
    - "@IBOutlet"
    - "@IBAction"
    - "@IBInspectable"
    - "@IBDesignable"
    - "@NSManaged"

reporter: xcode
